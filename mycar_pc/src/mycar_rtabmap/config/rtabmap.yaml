# RTAB-Map 3D 建图 — 纯点云 ICP 模式
rtabmap:
  ros__parameters:
    frame_id: "base_footprint"
    subscribe_rgb: false
    subscribe_depth: false
    subscribe_scan_cloud: true
    subscribe_odom: false          # 不订阅 odom，用 scan-to-scan ICP
    publish_tf: true
    wait_for_transform: 0.5
    tf_tolerance: 5.0
    approx_sync: false
    cloud_decimation: 4
    cloud_voxel_size: 0.05
