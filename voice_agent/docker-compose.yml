services:
  voice-agent:
    build: .
    container_name: voice-agent
    ports:
      - "${AGENT_SERVER_PORT:-9015}:${AGENT_SERVER_PORT:-9015}"
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - RAG_BASE_URL=${RAG_BASE_URL:-http://host.docker.internal:9014/rag}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    command: python3 agent_server.py
