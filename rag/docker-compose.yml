
services:
  lancedb:
    build: .
    container_name: lancedb-server
    ports:
      - "9014:9014"  # RAG API 端口映射，宿主机:容器
    volumes:
      - ./data:/data  # 关键：将本地 data 目录挂载到容器内 /data
      - ./src:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 允许容器通过 host.docker.internal 访问宿主机
    environment:
      - TZ=Asia/Shanghai
      - EMBEDDING_URL=http://host.docker.internal:30000/v1  # 嵌入服务在宿主机上
      - EMBEDDING_MODEL=Qwen3-Embedding-0.6B
      - EMBEDDING_DIM=1024
      - DB_PATH=/data/lancedb
      - TABLE_NAME=books
    restart: always
    command:  python main.py
